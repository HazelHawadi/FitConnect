{% extends 'base.html' %} {% block content %}
<div class="container mt-5">
  <h2>Leave a Review for "{{ program.title }}"</h2>

  <div class="row">
    <div class="col-md-8 offset-md-2">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="id_rating" class="form-label">Rating</label>
          <select name="rating" id="id_rating" class="form-select" required>
            <option value="">Choose...</option>
            <option value="1">1 - Poor</option>
            <option value="2">2 - Ok-ish</option>
            <option value="3">3 - Good</option>
            <option value="4">4 - Great</option>
            <option value="5">5 - Excellent!</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="comment" class="form-label">Your Comment</label>
          <textarea
            name="comment"
            id="comment"
            class="form-control"
            rows="5"
            placeholder="Write your review here"
            required
          >
{{ review.comment }}</textarea
          >
        </div>

        <div class="mb-3">
          <button type="submit" class="btn btn-primary">Submit Review</button>
          <a
            href="{% url 'program_detail' program.id %}"
            class="btn btn-secondary"
            >Cancel</a
          >
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
