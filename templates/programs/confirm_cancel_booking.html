{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
  <h3>Cancel Booking</h3>
  <p>Are you sure you want to cancel your booking for <strong>{{ booking.program.title }}</strong> on <strong>{{ booking.date.date }}</strong>?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Cancel</button>
    <a href="{% url 'my_bookings' %}" class="btn btn-secondary">No, Go Back</a>
  </form>
</div>
{% endblock %}
