{% extends "account/base.html" %}

{% load i18n %}

{% block head_title %}{% trans "Sign Out" %}{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-sm">
        <div class="card-body text-center">
          <h1 class="card-title mb-4">{% trans "Sign Out" %}</h1>
          <p class="mb-4">{% trans "Are you sure you want to sign out?" %}</p>
          <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            {% if redirect_field_value %}
            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
            {% endif %}
            <button type="submit" class="btn btn-danger btn-lg w-100">{% trans "Sign Out" %}</button>
          </form>
          <a href="{% url 'account_login' %}" class="btn btn-secondary btn-sm mt-3">{% trans "Cancel" %}</a>
        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}
