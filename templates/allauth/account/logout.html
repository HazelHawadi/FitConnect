{% extends "base.html" %}
{% load i18n %}

{% block extra_title %} | Sign Out {% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <h2 class="mb-4">{% trans "Sign Out" %}</h2>
          <p>{% trans "Are you sure you want to sign out?" %}</p>

          <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger w-100 mb-2">{% trans "Sign Out" %}</button>
            <a href="{% url 'home' %}" class="btn btn-outline-secondary w-100">{% trans "Cancel" %}</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
